<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitWall — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    .logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #e10600, #b30500);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-weight: 700; font-size: 20px;
      margin: 0 auto 24px;
      box-shadow: 0 0 30px rgba(225,6,0,0.3);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: linear-gradient(135deg, #e10600, #c00500);
      color: #fff; border: none;
      padding: 12px 28px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PW</div>
    <h1>You're offline</h1>
    <p>PitWall needs an internet connection to fetch live F1 data. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
