<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2010;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b30500;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow border -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Red glow orb behind PW -->
  <ellipse cx="256" cy="240" rx="180" ry="140" fill="#e10600" opacity="0.06"/>

  <!-- PW letters -->
  <text x="256" y="295"
    font-family="Arial Black, Arial, sans-serif"
    font-size="230"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-10">PW</text>

  <!-- Red accent line — contained inside -->
  <rect x="110" y="328" width="292" height="10" rx="5" fill="url(#redGrad)" filter="url(#glow)"/>

  <!-- Subtitle -->
  <text x="256" y="415"
    font-family="Arial, sans-serif"
    font-size="38"
    font-weight="300"
    fill="#444444"
    text-anchor="middle"
    letter-spacing="12">PITWALL</text>
</svg>